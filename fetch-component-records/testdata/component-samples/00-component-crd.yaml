# Minimal Component CRD for kwok-based tests.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: components.appstudio.redhat.com
spec:
  group: appstudio.redhat.com
  scope: Namespaced
  names:
    plural: components
    singular: component
    kind: Component
    listKind: ComponentList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true

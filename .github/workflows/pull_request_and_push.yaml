---
name: checks on Pull Request and push
"on":
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
jobs:
  lint-and-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install Python dependencies
        run: pip install -r requirements.lock
      - name: "Lint: run pre-commit checks (shellcheck, golangci-lint,\
          \ yamllint, actionlint, markdownlint)"
        run: pre-commit run --verbose --all-files
      - name: "Type-check: go vet"
        run: go vet ./...

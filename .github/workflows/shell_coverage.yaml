---
name: Shell script coverage
"on":
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
jobs:
  shell-coverage:
    runs-on: ubuntu-latest
    env:
      KCOV_OUTPUT_DIR: kcov-output
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Podman and kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman \
            cmake g++ binutils-dev libdw-dev \
            libcurl4-openssl-dev zlib1g-dev
      - name: Build and install kcov
        run: |
          git clone --depth 1 \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build
          cmake --build /tmp/kcov-build -j"$(nproc)"
          sudo cmake --install /tmp/kcov-build
          kcov --version
      - name: Run Go tests with kcov shell instrumentation
        run: |
          mkdir -p "$KCOV_OUTPUT_DIR"
          go test -v ./...
      - name: Print per-file shell coverage summary
        if: always()
        run: |
          XML="kcov-output/kcov-merged/cobertura.xml"
          if [[ ! -f "$XML" ]]; then
            echo "::warning::No cobertura.xml found at $XML"
            exit 0
          fi
          echo "## Shell script coverage (kcov)"
          python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('$XML')
          root = tree.getroot()
          print(f\"{'File':<55} {'Lines':>6} {'Hits':>6} {'Cov%':>6}\")
          print('-' * 75)
          total_lines = total_hits = 0
          for pkg in root.findall('.//package'):
              for cls in pkg.findall('.//class'):
                  fn = cls.get('filename', '?')
                  lines = cls.findall('lines/line')
                  n = len(lines)
                  h = sum(1 for l in lines if int(l.get('hits', 0)) > 0)
                  pct = (h * 100 / n) if n else 0
                  total_lines += n
                  total_hits += h
                  print(f'{fn:<55} {n:>6} {h:>6} {pct:>5.1f}%')
          pct = (total_hits * 100 / total_lines) if total_lines else 0
          print('-' * 75)
          t = 'TOTAL'
          print(f'{t:<55} {total_lines:>6} {total_hits:>6} {pct:>5.1f}%')
          "
      - name: Upload shell coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: shell-scripts
          files: kcov-output/kcov-merged/cobertura.xml
          fail_ci_if_error: false

# This repo's product is shell scripts (scripts/*.sh). Go paths below are
# test infrastructure — fixtures, helpers, and mocks that exercise those
# scripts. Makefile and README.md are build and documentation glue, not
# executable product code. Excluding these keeps the metric focused on
# shell scripts rather than harness, docs, or build wiring.
codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: true
    patch:
      default:
        target: 80%
        threshold: 2%
        informational: true

ignore:
  - "Makefile"
  - "README.md"
  - "testfixture/"
  - "containerfixture/"
  - "kwok/"
  - "webfixture/"
  - "scripts/runner.go"
  - "scripts/prepare-oc-client-for-build.sh"
  - "scripts/jq/"
  - "tekton-e2e/"

flags:
  unit-tests:
    carryforward: true
  e2e-tests:
    carryforward: true
  shell-scripts:
    carryforward: true

comment:
  layout: "condensed_header, condensed_files"
  require_changes: true
